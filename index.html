<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f766e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Groceries">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon-32.png">
<title>Grocery &amp; Meal Planner</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#f4f6f8; --card:#ffffff; --ink:#1a2230; --muted:#6b7686;
    --line:#e6e9ee; --teal:#0f766e; --teal-soft:#e6f4f2; --done:#94a3b8;
  }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.4; padding-bottom:48px; }
  header{ position:sticky; top:0; z-index:10; background:var(--teal); color:#fff;
    padding:16px 18px 14px; box-shadow:0 2px 10px rgba(0,0,0,.12); }
  .titlerow{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  h1{ margin:0; font-size:20px; font-weight:700; letter-spacing:-.2px; }
  .sync{ font-size:11px; font-weight:600; padding:4px 9px; border-radius:20px; background:rgba(255,255,255,.18); white-space:nowrap; }
  .sync.off{ background:#b91c1c; }
  .sub{ font-size:12.5px; opacity:.85; margin-top:2px; }
  .progwrap{ margin-top:12px; }
  .progbar{ height:8px; background:rgba(255,255,255,.25); border-radius:6px; overflow:hidden; }
  .progfill{ height:100%; background:#fff; width:0%; transition:width .3s ease; border-radius:6px; }
  .progtext{ font-size:12px; margin-top:5px; opacity:.9; }

  .tabs{ display:flex; gap:8px; padding:12px 14px 0; max-width:720px; margin:0 auto; }
  .tab{ flex:1; text-align:center; padding:10px; font-size:13.5px; font-weight:600;
    background:var(--card); border:1px solid var(--line); border-radius:10px 10px 0 0;
    color:var(--muted); cursor:pointer; user-select:none; }
  .tab.active{ color:var(--teal); border-bottom:2px solid var(--teal); }

  main{ max-width:720px; margin:0 auto; padding:6px 14px; }
  .store{ background:var(--card); border:1px solid var(--line); border-radius:12px; margin:12px 0; overflow:hidden; }
  .store-head{ display:flex; align-items:center; gap:10px; padding:13px 15px; cursor:pointer; }
  .chev{ transition:transform .2s; flex:none; color:var(--muted); }
  .store.collapsed .chev{ transform:rotate(-90deg); }
  .store-title{ font-size:15px; font-weight:700; flex:1; }
  .store-title[contenteditable]{ outline:none; border-bottom:1px dashed var(--teal); }
  .store-count{ font-size:12px; color:var(--muted); font-weight:600; background:var(--bg); padding:3px 9px; border-radius:20px; }
  .del-store{ flex:none; color:#b91c1c; font-size:18px; padding:0 4px; cursor:pointer; }
  .items{ border-top:1px solid var(--line); }
  .store.collapsed .items{ display:none; }
  .item{ display:flex; align-items:flex-start; gap:12px; padding:12px 15px; border-bottom:1px solid var(--line); }
  .item:last-child{ border-bottom:none; }
  .box{ flex:none; width:22px; height:22px; border:2px solid #c4ccd6; border-radius:6px; margin-top:1px;
    display:flex; align-items:center; justify-content:center; transition:.15s; cursor:pointer; }
  .item.done .box{ background:var(--teal); border-color:var(--teal); }
  .box svg{ width:14px; height:14px; opacity:0; }
  .item.done .box svg{ opacity:1; }
  .txt{ flex:1; cursor:pointer; }
  .name{ font-size:14.5px; font-weight:600; }
  .item.done .name{ color:var(--done); text-decoration:line-through; }
  .note{ font-size:12px; color:var(--muted); margin-top:2px; }
  .stamp{ font-size:11px; color:var(--teal); margin-top:3px; font-weight:600; }
  .item.done .stamp{ color:var(--done); }
  .del-item{ flex:none; color:#b91c1c; font-size:17px; padding:2px 4px; cursor:pointer; display:none; }
  body.editing .del-item{ display:block; }
  body.editing .del-store{ display:block; }
  .del-store{ display:none; }

  .additem{ display:none; padding:10px 15px; gap:8px; border-top:1px dashed var(--line); background:#fafbfc; }
  body.editing .additem{ display:flex; }
  .additem input{ flex:1; padding:9px 11px; font-size:14px; border:1px solid var(--line); border-radius:8px; }
  .additem button{ padding:9px 14px; font-size:14px; font-weight:600; background:var(--teal); color:#fff; border:none; border-radius:8px; cursor:pointer; }

  .day{ background:var(--card); border:1px solid var(--line); border-radius:12px; margin:12px 0; overflow:hidden; }
  .day-head{ padding:12px 15px; font-weight:700; font-size:14px; background:var(--teal-soft); color:var(--teal); display:flex; justify-content:space-between; }
  .day-item{ padding:9px 15px; font-size:13.5px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; }
  .day-item:last-child{ border-bottom:none; }
  .day-item .st{ font-size:11px; color:var(--muted); flex:none; }
  .empty{ text-align:center; color:var(--muted); padding:40px 20px; font-size:14px; }

  .addstore{ display:none; width:100%; padding:13px; margin:6px 0 2px; font-size:14px; font-weight:600;
    border:1.5px dashed var(--teal); color:var(--teal); background:var(--teal-soft); border-radius:12px; cursor:pointer; }
  body.editing .addstore{ display:block; }

  .toolbar{ display:flex; gap:8px; margin:14px 0 4px; }
  .btn{ flex:1; padding:11px; font-size:13px; font-weight:600; border-radius:10px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; }
  .btn.primary{ background:var(--teal); color:#fff; border-color:var(--teal); }
  .btn.warn{ color:#b91c1c; border-color:#f0c9c9; background:#fef2f2; }
  .hidden{ display:none; }
  .footnote{ text-align:center; font-size:11px; color:var(--muted); margin-top:18px; padding:0 10px; }

  /* Meal plan */
  .daypills{ display:flex; gap:6px; overflow-x:auto; padding:4px 0 10px; -webkit-overflow-scrolling:touch; }
  .daypill{ flex:none; min-width:46px; text-align:center; padding:9px 10px; border-radius:10px; background:var(--card); border:1px solid var(--line); font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; }
  .daypill.active{ background:var(--teal); color:#fff; border-color:var(--teal); }
  .daypill.today:not(.active){ border-color:var(--teal); color:var(--teal); }
  .plan-head{ font-size:17px; font-weight:700; margin:4px 2px 10px; }
  .plan-head .totals{ display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-top:3px; }
  .timeline{ background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .tl-item{ display:flex; gap:11px; padding:12px 13px; border-bottom:1px solid var(--line); }
  .tl-item:last-child{ border-bottom:none; }
  .tl-time{ flex:none; width:44px; font-size:12px; font-weight:700; color:var(--teal); padding-top:2px; }
  .tl-body{ flex:1; min-width:0; }
  .tl-slot{ font-size:13.5px; font-weight:700; margin-bottom:5px; }
  .tl-both{ font-size:12.5px; color:var(--muted); }
  .tl-split{ display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  .tl-p{ font-size:11.5px; line-height:1.35; color:var(--ink); background:var(--bg); border-radius:8px; padding:7px 8px; }
  .who{ display:block; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
  .who.a{ color:#0f766e; } .who.v{ color:#b45309; }
  .everyday, .glance-wrap{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-top:12px; }
  .ed-title{ font-size:13px; font-weight:800; margin-bottom:8px; }
  .ed-item{ font-size:12.5px; color:var(--muted); padding:3px 0; }
  .gl-row{ display:grid; grid-template-columns:36px 1fr 1fr; gap:8px; align-items:center; padding:9px 0; border-top:1px solid var(--line); font-size:11.5px; cursor:pointer; }
  .gl-row:first-child{ border-top:none; }
  .gl-row.today{ background:var(--teal-soft); margin:0 -14px; padding-left:14px; padding-right:14px; }
  .gl-day{ font-weight:800; color:var(--teal); }
  .gl-meal{ color:var(--ink); }
  .legend{ font-size:11px; color:var(--muted); margin-top:10px; line-height:1.4; }
  .dish{ color:var(--teal); font-weight:700; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:2px; cursor:pointer; }

  /* Glance v2 */
  .gl2{ padding:8px 0 2px; border-top:1px solid var(--line); cursor:pointer; }
  .gl2:first-child{ border-top:none; }
  .gl2.today{ background:var(--teal-soft); margin:0 -14px; padding:8px 14px; }
  .gl2-day{ font-size:12px; font-weight:800; color:var(--teal); margin-bottom:3px; }
  .gl2-day .now{ font-size:10px; background:var(--teal); color:#fff; padding:1px 6px; border-radius:10px; margin-left:6px; }
  .gl2-line{ font-size:12px; color:var(--ink); padding:2px 0; }
  .gl2-line b{ color:var(--muted); font-weight:700; }

  /* Recipe modal */
  .rc-overlay{ display:none; position:fixed; inset:0; background:rgba(20,28,40,.5); z-index:50; align-items:flex-end; justify-content:center; }
  .rc-overlay.show{ display:flex; }
  .rc-card{ background:var(--card); width:100%; max-width:560px; max-height:88vh; overflow-y:auto; border-radius:16px 16px 0 0; padding:0 18px 28px; }
  @media(min-width:560px){ .rc-overlay{ align-items:center; } .rc-card{ border-radius:16px; } }
  .rc-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; position:sticky; top:0; background:var(--card); padding:16px 0 10px; border-bottom:1px solid var(--line); }
  .rc-title{ font-size:17px; font-weight:800; }
  .rc-sub{ font-size:12px; color:var(--teal); font-weight:700; margin-top:3px; }
  .rc-x{ flex:none; border:none; background:var(--bg); width:32px; height:32px; border-radius:50%; font-size:14px; cursor:pointer; color:var(--muted); }
  .rc-note{ font-size:12.5px; color:var(--ink); background:var(--teal-soft); border-radius:8px; padding:9px 11px; margin:12px 0 4px; }
  .rc-h{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:14px 0 6px; }
  .rc-ing{ margin:0; padding-left:18px; } .rc-ing li{ font-size:13px; margin:4px 0; line-height:1.35; }
  .rc-meth{ margin:0; padding-left:20px; } .rc-meth li{ font-size:13px; margin:7px 0; line-height:1.45; }

  /* Prep tab */
  .prep-intro{ font-size:12.5px; color:var(--muted); margin:4px 2px 4px; line-height:1.5; }
  .prep-card{ background:var(--card); border:1px solid var(--line); border-radius:12px; margin:12px 0; overflow:hidden; }
  .prep-head{ padding:12px 14px; font-weight:800; font-size:14px; background:var(--teal-soft); color:var(--teal); }
  .prep-row{ padding:11px 14px; border-top:1px solid var(--line); font-size:13px; line-height:1.4; }
  .prep-row:first-child{ border-top:none; }
  .pr-t{ font-weight:700; }
  .pr-d{ font-size:12px; color:var(--muted); margin-top:2px; }
  .pr-time{ float:right; font-size:11px; color:var(--muted); font-weight:700; margin-left:8px; }
  .step-num{ display:inline-flex; width:20px; height:20px; border-radius:50%; background:var(--teal); color:#fff; font-size:11px; font-weight:800; align-items:center; justify-content:center; margin-right:9px; vertical-align:middle; }
  .rc-link{ font-size:11.5px; color:var(--teal); font-weight:700; margin-top:3px; cursor:pointer; }
  .btn.coles{ background:#e01a22; color:#fff; border-color:#e01a22; }
  .coles-item{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:11px 12px; border:1px solid var(--line); border-radius:9px; margin:7px 0; font-size:13.5px; font-weight:600; color:var(--ink); text-decoration:none; }
  .coles-item:active{ background:var(--bg); }
  .coles-go{ font-size:12px; color:#e01a22; font-weight:800; flex:none; }
  .coles-copy{ width:100%; margin:2px 0 10px; }
  .pin-in{ width:100%; text-align:center; font-size:26px; letter-spacing:8px; padding:12px; border:1.5px solid var(--line); border-radius:10px; font-weight:700; }
  .pin-in:focus{ outline:none; border-color:var(--teal); }
  .pin-err{ font-size:12.5px; color:#b91c1c; text-align:center; min-height:16px; margin-top:8px; font-weight:600; }
  .searchbar{ display:flex; align-items:center; gap:9px; background:var(--card); border:1px solid var(--line); border-radius:11px; padding:10px 13px; margin:12px 0 0; }
  .searchbar .s-ico{ font-size:14px; opacity:.55; }
  .searchbar input{ flex:1; border:none; outline:none; font-size:15px; background:transparent; color:var(--ink); }
  .searchbar .s-clr{ color:var(--muted); font-size:14px; cursor:pointer; display:none; padding:2px 4px; }
  .searchbar.has .s-clr{ display:block; }
  mark{ background:#fde68a; color:inherit; border-radius:3px; padding:0 1px; }
  .ask-in{ width:100%; font-size:16px; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px; }
  .ask-in:focus{ outline:none; border-color:var(--teal); }
  .ask-msg{ font-size:13.5px; color:var(--muted); line-height:1.45; }
  .btn.submit{ background:#0f766e; color:#fff; border-color:#0f766e; font-size:15px; padding:13px; }
  .cost-sum{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:12px 0; }
  .cs-box{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:9px 6px; text-align:center; }
  .cs-l{ display:block; font-size:10px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:700; }
  .cs-v{ display:block; font-size:15px; font-weight:800; margin-top:3px; }
  .cs-v.lo{ color:#0f766e; } .cs-v.hi{ color:#b91c1c; }
  .sub-cost{ font-size:15px; font-weight:800; color:var(--teal); cursor:pointer; }
  .sub-cost.none{ font-size:12px; font-weight:700; color:var(--muted); }
  .sub-meta{ font-size:11px; color:var(--muted); padding:8px 15px 4px; }
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <h1>🛒 Grocery Checklist</h1>
    <span class="sync" id="sync">…</span>
  </div>
  <div class="sub" id="sub">Synced across your devices</div>
  <div class="progwrap">
    <div class="progbar"><div class="progfill" id="progfill"></div></div>
    <div class="progtext" id="progtext">0 of 0 done</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-list" onclick="showTab('list')">Shop</div>
  <div class="tab" id="tab-plan" onclick="showTab('plan')">Meals</div>
  <div class="tab" id="tab-prep" onclick="showTab('prep')">Prep</div>
  <div class="tab" id="tab-log" onclick="showTab('log')">Log</div>
</div>

<main>
  <div class="searchbar" id="searchbar">
    <span class="s-ico">🔎</span>
    <input id="search" type="search" autocomplete="off" placeholder="Search items…" oninput="doSearch(this.value)">
    <span class="s-clr" id="sClr" onclick="clearSearch()">✕</span>
  </div>
  <div id="view-list"></div>
  <button class="addstore" onclick="addStore()">＋ Add section</button>
  <div id="view-plan" class="hidden"></div>
  <div id="view-prep" class="hidden"></div>
  <div id="view-log" class="hidden"></div>

  <div class="toolbar">
    <button class="btn submit" onclick="submitList()">✅ Submit shop &amp; log the bill</button>
  </div>
  <div class="toolbar">
    <button class="btn coles" onclick="openColes()">🛒 Send list to Coles</button>
  </div>
  <div class="toolbar">
    <button class="btn primary" id="editBtn" onclick="toggleEdit()">✏️ Edit list</button>
    <button class="btn" onclick="collapseAll()">Collapse all</button>
  </div>
  <div class="toolbar">
    <button class="btn warn" onclick="resetAll()">Reset all ticks</button>
  </div>
  <div class="footnote">In Edit mode you can add/delete items and sections, rename by tapping the text, and remove sections with 🗑. On iPad: Safari → Share → Add to Home Screen.</div>
</main>

<div id="recipeModal" class="rc-overlay" onclick="if(event.target===this)closeRecipe()">
  <div class="rc-card">
    <div class="rc-top">
      <div><div class="rc-title"></div><div class="rc-sub"></div></div>
      <button class="rc-x" onclick="closeRecipe()">✕</button>
    </div>
    <div class="rc-body"></div>
  </div>
</div>

<div id="colesModal" class="rc-overlay" onclick="if(event.target===this)closeColes()">
  <div class="rc-card">
    <div class="rc-top">
      <div><div class="rc-title">Shop at Coles</div><div class="rc-sub"></div></div>
      <button class="rc-x" onclick="closeColes()">✕</button>
    </div>
    <div class="rc-body"></div>
  </div>
</div>

<div id="pinModal" class="rc-overlay" onclick="if(event.target===this)closePin()">
  <div class="rc-card" style="max-width:340px">
    <div class="rc-top"><div class="rc-title">Enter code to edit</div><button class="rc-x" onclick="closePin()">✕</button></div>
    <div class="rc-body">
      <input id="pinInput" type="tel" inputmode="numeric" maxlength="8" placeholder="••••" class="pin-in" onkeydown="if(event.key==='Enter')submitPin()">
      <div id="pinErr" class="pin-err"></div>
      <button class="btn primary" style="width:100%;margin-top:12px" onclick="submitPin()">Unlock editing</button>
    </div>
  </div>
</div>

<div id="askModal" class="rc-overlay" onclick="if(event.target===this)askCancel()">
  <div class="rc-card" style="max-width:360px">
    <div class="rc-top"><div class="rc-title" id="askTitle"></div><button class="rc-x" onclick="askCancel()">✕</button></div>
    <div class="rc-body">
      <input id="askInput" class="ask-in" placeholder="">
      <div id="askMsg" class="ask-msg"></div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn" style="flex:1" onclick="askCancel()">Cancel</button>
        <button class="btn primary" style="flex:1" id="askOk">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ==== CONFIG: Supabase cloud sync ==== */
const SB_URL = "https://utcsxenvsnuywojtonll.supabase.co/rest/v1/checklist";
const SB_KEY = "sb_publishable_EIU5NMbeUTy0mdhUQLP3Ug_jGTPiMki";
const EDIT_CODE = "2580";  // code required to unlock Edit mode
/* ===================================== */

const LKEY = "grocery_checklist_v3";
let editing = false, pushTimer = null, pulling = false;

const SEED = { updatedAt:0, submissions:[], stores:[
  { id:"g", name:"🏪 Indian Grocery", collapsed:false, items:[
    it("Ginger turmeric"), it("Low-fat paneer","~1.2kg · 4 of 5 dishes + burrito bowls"),
    it("Fresh turmeric + black pepper"),
    it("Spices bundle","shahi paneer masala, egg-curry masala, garam masala, Kashmiri chilli, coriander seeds, cumin, turmeric, mustard & fennel powder, methi"),
    it("Cumin seeds","jeera water"), it("Saffron strands"),
    it("Chaat masala","for mint chutney"), it("Black salt (kala namak)","for mint chutney") ]},
  { id:"c", name:"📦 Costco", collapsed:false, items:[
    it("Eggs — 1 dozen","Egg Curry"), it("Whey or plant protein powder","vanilla"),
    it("Collagen powder"), it("Black beans / rajma","canned"), it("Sweetcorn","canned/frozen"),
    it("Red onion"), it("Onions — ~1.5kg","regular/brown"), it("Coffee"), it("Multivitamins") ]},
  { id:"w", name:"🛒 Woolworths / Coles", collapsed:false, items:[
    it("Low-fat Greek yogurt","large tub ~2kg · smoothies, burrito bowls, achari marinade"),
    it("Fat-free / skim milk","~3L · incl. 200ml for Shahi Paneer"), it("Taco / burrito seasoning"),
    it("Tofu","optional · paneer sub"), it("Mixed berries","fresh or frozen, ~1.5kg"),
    it("Capsicum — ~8","Kadhai / Chilli Paneer / Achari"), it("Tomatoes — ~1.5kg"),
    it("Cucumber — ~3"), it("Carrots","small"), it("Jalapeños"), it("Ginger, garlic, green chilli"),
    it("Fresh coriander, mint"), it("Lemons & limes"), it("Red rice"),
    it("Low-sodium / dark soy sauce"), it("Green chilli sauce"), it("Ketchup"), it("Cornflour"),
    it("Almonds, walnuts, mixed nuts"), it("Coconut water — 7+"), it("Stevia / sugar-free sweetener"),
    it("Spray oil / cooking oil") ]},
  { id:"e", name:"🧻 Essentials", collapsed:false, items:[
    it("Tissue box (square)","Coles"), it("Toilet paper","Costco") ]},
]};

function uid(){ return Math.random().toString(36).slice(2,9); }
function it(n,d){ return {id:uid(), n:n, d:d||"", done:false, ts:0}; }

let data = load();
function load(){ try{ const s=JSON.parse(localStorage.getItem(LKEY)); if(s&&s.stores){ if(!s.submissions) s.submissions=[]; return s; } }catch(e){} return JSON.parse(JSON.stringify(SEED)); }
function saveLocal(){ data.updatedAt=Date.now(); localStorage.setItem(LKEY, JSON.stringify(data)); }

const cloudOn = SB_URL && !SB_URL.startsWith("__");
function sbHeaders(extra){ return Object.assign({apikey:SB_KEY, Authorization:"Bearer "+SB_KEY, "Content-Type":"application/json"}, extra||{}); }
function setSync(t,cls){ const e=document.getElementById('sync'); e.textContent=t; e.className='sync '+(cls||''); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'}); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }

/* ---- cloud sync: whole-document, newest wins ---- */
function schedulePush(){ if(!cloudOn) return; clearTimeout(pushTimer); pushTimer=setTimeout(push, 600); }
function adoptRemote(remote){
  if(!remote || !remote.stores) return false;
  if((remote.updatedAt||0) > (data.updatedAt||0)){
    if(!remote.submissions) remote.submissions=[];
    data = remote; localStorage.setItem(LKEY, JSON.stringify(data)); render(); return true;
  }
  return false;
}
async function push(){
  if(!cloudOn) return;
  try{ setSync('Syncing…');
    // Safety: if we're NOT actively editing and the cloud copy is newer than ours,
    // adopt the cloud version instead of clobbering it with our older snapshot.
    if(!editing){
      const chk = await fetch(SB_URL+'?id=eq.main&select=data', {headers:sbHeaders()});
      const arr = await chk.json();
      const rem = (Array.isArray(arr) && arr[0]) ? arr[0].data : null;
      if(rem && rem.stores && (rem.updatedAt||0) > (data.updatedAt||0)){ adoptRemote(rem); setSync('Synced ✓'); return; }
    }
    await fetch(SB_URL, {method:'POST', headers:sbHeaders({Prefer:'resolution=merge-duplicates'}), body:JSON.stringify({id:'main', data:data})});
    setSync('Synced ✓');
  }catch(e){ setSync('Offline','off'); }
}
async function pull(){
  if(!cloudOn){ setSync('Local only'); return; }
  if(pulling || editing) return;   // don't overwrite the list while you're editing it
  pulling=true;
  try{
    const r = await fetch(SB_URL+'?id=eq.main&select=data', {headers:sbHeaders()});
    const arr = await r.json();
    const remote = (Array.isArray(arr) && arr[0]) ? arr[0].data : null;
    adoptRemote(remote);
    setSync('Synced ✓');
  }catch(e){ setSync('Offline','off'); }
  pulling=false;
}

function render(){
  const list=document.getElementById('view-list'); list.innerHTML='';
  let total=0, done=0;
  data.stores.forEach(store=>{
    let sDone=0;
    store.items.forEach(x=>{ total++; if(x.done){ done++; sDone++; } });
    const shown = searchQ ? store.items.filter(x=>(x.n+' '+(x.d||'')).toLowerCase().includes(searchQ)) : store.items;
    if(searchQ && shown.length===0) return;
    const itemsHtml = shown.map(x=>{
      return `<div class="item ${x.done?'done':''}">
        <div class="box" onclick="toggle('${store.id}','${x.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="txt" onclick="editing?renameItem('${store.id}','${x.id}'):toggle('${store.id}','${x.id}')">
          <div class="name">${hl(x.n)}</div>
          ${x.d?`<div class="note">${hl(x.d)}</div>`:''}
          ${x.done?`<div class="stamp">✓ Ordered ${fmtDate(x.ts)} · ${fmtTime(x.ts)}</div>`:''}
        </div>
        <div class="del-item" onclick="delItem('${store.id}','${x.id}')">✕</div>
      </div>`;
    }).join('');
    list.innerHTML += `<div class="store ${(!searchQ && store.collapsed)?'collapsed':''}">
      <div class="store-head">
        <span class="chev" onclick="toggleStore('${store.id}')">▾</span>
        <div class="store-title" onclick="editing?renameStore('${store.id}'):toggleStore('${store.id}')">${esc(store.name)}</div>
        <span class="store-count">${sDone}/${store.items.length}</span>
        <span class="del-store" onclick="delStore('${store.id}')">🗑</span>
      </div>
      <div class="items">${itemsHtml||'<div class="item"><div class="txt note">No items yet</div></div>'}</div>
      <div class="additem">
        <input placeholder="Add item to ${esc(store.name)}…" onkeydown="if(event.key==='Enter')addItem('${store.id}',this)">
        <button onclick="addItem('${store.id}',this.previousElementSibling)">Add</button>
      </div>
    </div>`;
  });
  if(searchQ && !list.innerHTML.trim()) list.innerHTML=`<div class="empty">No items match "${esc(searchQ)}".</div>`;
  const pct = total? Math.round(done/total*100):0;
  document.getElementById('progfill').style.width=pct+'%';
  document.getElementById('progtext').textContent=`${done} of ${total} done · ${pct}%`;
  renderLog();
}
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderLog(){
  const log=document.getElementById('view-log');
  const subs=(data.submissions||[]);
  if(!subs.length){ log.innerHTML=`<div class="empty">No submitted shops yet.<br>Tick what you bought, tap “Submit shop”, and add the bill total — it’ll be logged here so you can compare costs over time.</div>`; return; }
  const costs=subs.filter(s=>typeof s.cost==='number').map(s=>s.cost);
  let summary='';
  if(costs.length){
    const avg=costs.reduce((a,b)=>a+b,0)/costs.length, min=Math.min(...costs), max=Math.max(...costs);
    summary=`<div class="cost-sum">
      <div class="cs-box"><span class="cs-l">Shops</span><span class="cs-v">${subs.length}</span></div>
      <div class="cs-box"><span class="cs-l">Average</span><span class="cs-v">$${avg.toFixed(2)}</span></div>
      <div class="cs-box"><span class="cs-l">Lowest</span><span class="cs-v lo">$${min.toFixed(2)}</span></div>
      <div class="cs-box"><span class="cs-l">Highest</span><span class="cs-v hi">$${max.toFixed(2)}</span></div>
    </div>`;
  }
  log.innerHTML = summary + subs.map((s,i)=>{
    const cost = (typeof s.cost==='number')
      ? `<span class="sub-cost" onclick="editSubCost(${i})">$${s.cost.toFixed(2)}</span>`
      : `<span class="sub-cost none" onclick="editSubCost(${i})">+ add bill</span>`;
    const items=(s.items||[]).map(x=>`<div class="day-item"><span>${esc(x.n)}</span><span class="st">${esc((x.store||'').replace(/^[^ ]+ /,''))}</span></div>`).join('');
    return `<div class="day"><div class="day-head"><span>${fmtDate(s.ts)} · ${fmtTime(s.ts)}</span>${cost}</div>
      <div class="sub-meta">${(s.items||[]).length} items · tap the amount to edit</div>${items}</div>`;
  }).join('');
}

function findStore(sid){ return data.stores.find(s=>s.id===sid); }
function toggle(sid,iid){ const x=findStore(sid).items.find(i=>i.id===iid); x.done=!x.done; x.ts=Date.now(); saveLocal(); render(); schedulePush(); }
function toggleStore(sid){ const s=findStore(sid); s.collapsed=!s.collapsed; saveLocal(); render(); schedulePush(); }
function collapseAll(){ const anyOpen=data.stores.some(s=>!s.collapsed); data.stores.forEach(s=>s.collapsed=anyOpen); saveLocal(); render(); schedulePush(); }

function addItem(sid,input){ const v=(input.value||'').trim(); if(!v) return; findStore(sid).items.push(it(v)); input.value=''; saveLocal(); render(); schedulePush();
  const boxes=document.querySelectorAll('.additem input'); }
function delItem(sid,iid){ const s=findStore(sid); s.items=s.items.filter(i=>i.id!==iid); saveLocal(); render(); schedulePush(); }
function renameItem(sid,iid){ const x=findStore(sid).items.find(i=>i.id===iid); askInput('Rename item', x.n, v=>{ x.n=(v||'').trim()||x.n; saveLocal(); render(); schedulePush(); }, {okText:'Save'}); }
function renameStore(sid){ const s=findStore(sid); askInput('Rename section', s.name, v=>{ s.name=(v||'').trim()||s.name; saveLocal(); render(); schedulePush(); }, {okText:'Save'}); }
function delStore(sid){ const s=findStore(sid); askConfirm('Delete section?', 'Delete "'+s.name+'" and all its items? This cannot be undone.', ()=>{ data.stores=data.stores.filter(x=>x.id!==sid); saveLocal(); render(); schedulePush(); }); }
function addStore(){ askInput('New section name', '', v=>{ const name=(v||'').trim(); if(!name) return; data.stores.push({id:uid(), name:name, collapsed:false, items:[]}); saveLocal(); render(); schedulePush(); }, {placeholder:'e.g. 🥩 Butcher', okText:'Add section'}); }

function toggleEdit(){
  if(!editing){ openPin(); return; }
  editing=false; document.body.classList.remove('editing');
  document.getElementById('editBtn').textContent='✏️ Edit list'; render();
}
function enterEdit(){ editing=true; document.body.classList.add('editing');

function openPin(){ const m=document.getElementById('pinModal'); document.getElementById('pinInput').value=''; document.getElementById('pinErr').textContent=''; m.classList.add('show'); setTimeout(()=>document.getElementById('pinInput').focus(),60); }
function closePin(){ document.getElementById('pinModal').classList.remove('show'); }

/* ===== In-app dialogs (replace blocked prompt/confirm) ===== */
let _askCb=null;
function askInput(title, value, cb, opts){
  opts=opts||{}; _askCb=cb;
  document.getElementById('askTitle').textContent=title;
  document.getElementById('askMsg').textContent=opts.msg||'';
  const inp=document.getElementById('askInput'); inp.style.display='block';
  inp.value=value||''; inp.placeholder=opts.placeholder||''; inp.inputMode=opts.numeric?'decimal':'text';
  const ok=document.getElementById('askOk'); ok.textContent=opts.okText||'Save';
  ok.onclick=()=>{ const v=inp.value; askClose(); if(_askCb)_askCb(v); };
  inp.onkeydown=(e)=>{ if(e.key==='Enter') ok.onclick(); };
  document.getElementById('askModal').classList.add('show'); setTimeout(()=>inp.focus(),60);
}
function askConfirm(title,msg,cb){
  _askCb=cb;
  document.getElementById('askTitle').textContent=title;
  document.getElementById('askMsg').textContent=msg||'';
  document.getElementById('askInput').style.display='none';
  const ok=document.getElementById('askOk'); ok.textContent='Confirm'; ok.onclick=()=>{ askClose(); if(_askCb)_askCb(true); };
  document.getElementById('askModal').classList.add('show');
}
function askInfo(title,msg){
  _askCb=null;
  document.getElementById('askTitle').textContent=title;
  document.getElementById('askMsg').textContent=msg||'';
  document.getElementById('askInput').style.display='none';
  const ok=document.getElementById('askOk'); ok.textContent='OK'; ok.onclick=askClose;
  document.getElementById('askModal').classList.add('show');
}
function askCancel(){ askClose(); }
function askClose(){ document.getElementById('askModal').classList.remove('show'); _askCb=null; }

/* ===== Submit shop + bill logging ===== */
function isColesItem(x){ return /coles/i.test(x.store||'') || /coles/i.test(x.d||''); }
function submitList(){
  const items=[]; data.stores.forEach(s=>s.items.forEach(x=>{ if(x.done) items.push({n:x.n, d:x.d||'', store:s.name}); }));
  if(!items.length){ askInfo('Nothing ticked yet','Tick the items you bought, then submit — they’ll be saved to your Order Log.'); return; }
  const colesNames = items.filter(isColesItem).map(x=>x.n);
  askInput('Submit shop — total bill?', '', v=>{
    const c=parseFloat(String(v).replace(/[^0-9.]/g,''));
    data.submissions = data.submissions||[];
    data.submissions.unshift({ts:Date.now(), items:items.map(x=>({n:x.n,store:x.store})), cost:isNaN(c)?null:c});
    data.stores.forEach(s=>s.items.forEach(x=>{ x.done=false; x.ts=0; }));
    saveLocal(); render(); schedulePush();
    if(colesNames.length) showColes(colesNames, 'Coles items — add to your basket');
    else showTab('log');
  }, {placeholder:'$ total, e.g. 142.50 (optional)', okText:'Submit '+items.length+' items', numeric:true, msg:'Logs these '+items.length+' items with the bill total, unticks them for next time'+(colesNames.length?', then opens the '+colesNames.length+' Coles item(s) to add to your basket.':'.')});
}
function editSubCost(i){ const s=(data.submissions||[])[i]; if(!s) return;
  askInput('Bill total for this shop', s.cost!=null?String(s.cost):'', v=>{ const c=parseFloat(String(v).replace(/[^0-9.]/g,'')); s.cost=isNaN(c)?null:c; saveLocal(); render(); schedulePush(); }, {placeholder:'$ total', okText:'Save', numeric:true}); }

/* ===== Send to Coles ===== */
function clx(n){ return n.replace(/\s*[—–]\s.*$/,'').replace(/\s*\(.*?\)/g,'').replace(/\s*·.*$/,'').replace(/\s*\/\s*/,' ').trim(); }
function colesItems(){ const a=[]; data.stores.forEach(s=>s.items.forEach(x=>{ if(!x.done) a.push(x.n); })); return a; }
let _colesNames=[];
function openColes(){ showColes(colesItems(), 'items still to buy'); }
function showColes(names, label){
  _colesNames=names;
  const links=names.map(n=>`<a class="coles-item" href="https://www.coles.com.au/search?q=${encodeURIComponent(clx(n))}" target="_blank" rel="noopener">${esc(n)}<span class="coles-go">Add ›</span></a>`).join('');
  const m=document.getElementById('colesModal');
  m.querySelector('.rc-sub').textContent=names.length+' '+(label||'items');
  m.querySelector('.rc-body').innerHTML = names.length
    ? `<div class="rc-note">Tap each item to open it on the Coles web app and add it to your basket. Coles doesn’t let outside apps fill the basket directly, so this opens each product ready to add.</div><button class="btn coles coles-copy" onclick="copyColes()">📋 Copy list</button>${links}`
    : `<div class="empty">No Coles items here 🎉</div>`;
  m.classList.add('show');
}
function closeColes(){ document.getElementById('colesModal').classList.remove('show'); }
function copyColes(){ navigator.clipboard.writeText(_colesNames.join('\n')).then(()=>{ const b=document.querySelector('.coles-copy'); if(b){ b.textContent='Copied ✓'; setTimeout(()=>b.textContent='📋 Copy list',1500); } }); }
function showTab(t){
  ['list','plan','prep','log'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',t===x);
    document.getElementById('view-'+x).classList.toggle('hidden',t!==x);
  });
  document.querySelector('.addstore').classList.toggle('hidden',t!=='list');
  document.getElementById('searchbar').classList.toggle('hidden',t!=='list');
  document.querySelectorAll('.toolbar').forEach(el=>el.classList.toggle('hidden',t!=='list'));
  if(t==='plan') renderPlan();
  if(t==='prep') renderPrep();
}
let searchQ='';
function doSearch(v){ searchQ=(v||'').trim().toLowerCase(); document.getElementById('searchbar').classList.toggle('has',!!searchQ); render(); }
function clearSearch(){ searchQ=''; const i=document.getElementById('search'); if(i)i.value=''; document.getElementById('searchbar').classList.remove('has'); render(); }
function hl(txt){ if(!searchQ) return esc(txt); const i=txt.toLowerCase().indexOf(searchQ); if(i<0) return esc(txt); return esc(txt.slice(0,i))+'<mark>'+esc(txt.slice(i,i+searchQ.length))+'</mark>'+esc(txt.slice(i+searchQ.length)); }

function openRecipe(name){
  const r=RECIPES[name]; if(!r) return;
  const m=document.getElementById('recipeModal');
  m.querySelector('.rc-title').textContent = name + (r.page? '  '+r.page : '');
  m.querySelector('.rc-sub').textContent = r.macros||'';
  m.querySelector('.rc-body').innerHTML =
    (r.note?`<div class="rc-note">${r.note}</div>`:'')+
    `<div class="rc-h">Ingredients</div><ul class="rc-ing">${(r.ing||[]).map(x=>`<li>${x}</li>`).join('')}</ul>`+
    `<div class="rc-h">Method</div><ol class="rc-meth">${(r.method||[]).map(x=>`<li>${x}</li>`).join('')}</ol>`;
  m.classList.add('show');
}
function closeRecipe(){ document.getElementById('recipeModal').classList.remove('show'); }
